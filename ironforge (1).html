<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronForge — Gym App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080808;--s1:#101010;--s2:#181818;--s3:#222;
  --acc:#D4FF00;--acc2:#FF3B30;--acc3:#00E5FF;
  --t:#F2F2F2;--td:#888;--tm:#555;--border:#242424;
  --r:16px;--r2:12px;--r3:8px;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;--disp:'Bebas Neue',sans-serif;
}
html,body{background:#000;font-family:var(--font);display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
body{padding:20px;background:radial-gradient(ellipse at 50% 0%,#161600,#000 60%)}
.phone{width:390px;height:844px;background:var(--bg);border-radius:50px;border:1.5px solid #1e1e1e;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 8px #0a0a0a,0 0 0 9px #181818,0 80px 160px rgba(0,0,0,.9)}
.notch{width:124px;height:34px;background:#000;border-radius:0 0 22px 22px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;justify-content:center}
.ncam{width:11px;height:11px;background:#111;border-radius:50%;border:2px solid #0a0a0a}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:12px 26px 0;font-size:11px;font-family:var(--mono);color:var(--td);height:44px;flex-shrink:0}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:84px}
.screen::-webkit-scrollbar{display:none}
.bnav{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(8,8,8,.97);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:18px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;border-radius:12px;background:none;border:none}
.ni.a .nico,.ni.a .nlb{color:var(--acc)}
.nico{font-size:20px;color:var(--td)}
.nlb{font-size:9px;color:var(--td);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.pg-head{padding:56px 22px 20px;background:linear-gradient(180deg,#121212,transparent)}
.pg-title{font-family:var(--disp);font-size:40px;color:var(--t);letter-spacing:1px;line-height:1}
.pg-sub{font-size:13px;color:var(--td);margin-top:4px}
.sec{padding:16px 22px 0}
.sec-title{font-family:var(--disp);font-size:20px;color:var(--t);letter-spacing:1px;margin-bottom:12px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r)}
.pill-acc{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;background:rgba(212,255,0,.1);border:1px solid rgba(212,255,0,.25);color:var(--acc)}
.pill-red{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.25);color:var(--acc2)}
.btn-acc{width:100%;padding:17px;border-radius:var(--r);border:none;background:var(--acc);color:#000;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer}
.btn-dim{width:100%;padding:16px;border-radius:var(--r);border:1px solid var(--border);background:var(--s2);color:var(--t);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer}
.row{display:flex;align-items:center;justify-content:space-between}
.pbar-track{height:5px;background:var(--s3);border-radius:100px;overflow:hidden}
.pbar-fill{height:100%;background:var(--acc);border-radius:100px;transition:width .8s}
.ob-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(212,255,0,.07),transparent 60%);pointer-events:none}
.ob-wrap{padding:80px 28px 40px;display:flex;flex-direction:column;height:100%}
.ob-logo{font-family:var(--disp);font-size:72px;color:var(--acc);line-height:1}
.ob-tagline{font-size:17px;color:var(--td);margin-top:8px;line-height:1.5}
.ob-form{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:14px;padding-bottom:20px}
.ob-input{width:100%;padding:16px 18px;border-radius:var(--r2);background:var(--s1);border:1px solid var(--border);color:var(--t);font-family:var(--font);font-size:15px;outline:none}
.ob-social{display:flex;gap:12px}
.ob-sbtn{flex:1;padding:14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--s1);color:var(--t);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.home-hero{padding:60px 22px 22px;background:linear-gradient(160deg,#131300,#0a0a0a 50%,var(--bg));position:relative;overflow:hidden}
.home-hero::after{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(212,255,0,.06),transparent 65%);border-radius:50%;pointer-events:none}
.h-greet{font-size:12px;color:var(--td);text-transform:uppercase;letter-spacing:2.5px;font-weight:600}
.h-name{font-family:var(--disp);font-size:54px;color:var(--t);line-height:.95;margin-top:2px}
.h-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.h-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:6px 14px}
.h-chip-val{font-size:14px;font-weight:700;color:var(--t);font-family:var(--mono)}
.h-chip-lbl{font-size:11px;color:var(--td)}
.today-card{background:var(--acc);border-radius:var(--r);padding:22px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(0,0,0,.07);border-radius:50%}
.tc-day{font-size:10px;font-weight:800;color:rgba(0,0,0,.45);text-transform:uppercase;letter-spacing:1.5px}
.tc-name{font-family:var(--disp);font-size:36px;color:#000;line-height:1.05;margin-top:2px}
.tc-meta{font-size:13px;color:rgba(0,0,0,.5);margin-top:4px;font-weight:500}
.tc-btn{width:56px;height:56px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.week-grid{display:flex;gap:6px}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.wd-lbl{font-size:10px;color:var(--td);font-family:var(--mono);font-weight:600}
.wd-dot{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:13px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qcard{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer}
.qcard-ico{font-size:26px;margin-bottom:8px}
.qcard-t{font-size:14px;font-weight:700;color:var(--t)}
.qcard-s{font-size:12px;color:var(--td);margin-top:2px}
.rchips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.rchips::-webkit-scrollbar{display:none}
.rchip{flex-shrink:0;padding:8px 18px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--s1);color:var(--td);white-space:nowrap}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px}
.ex-name{font-size:16px;font-weight:700;color:var(--t)}
.ex-muscle{font-size:12px;color:var(--td);margin-top:2px}
.ex-badge{background:var(--s2);border-radius:var(--r3);padding:4px 10px;font-size:11px;color:var(--tm);font-family:var(--mono)}
.sets-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.sbub{background:var(--s2);border-radius:9px;padding:6px 12px;font-size:12px;font-family:var(--mono);color:var(--td);display:flex;align-items:center;gap:5px;border:1px solid transparent;cursor:pointer}
.stype{font-size:9px;background:rgba(255,59,48,.15);color:var(--acc2);border-radius:3px;padding:1px 5px;font-weight:800}
.ai-box{margin-top:12px;background:rgba(212,255,0,.04);border:1px solid rgba(212,255,0,.15);border-radius:var(--r2);padding:12px;display:flex;gap:9px}
.ai-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.ai-txt{font-size:12px;color:var(--td);line-height:1.6}
.add-btn{width:100%;border:2px dashed var(--border);border-radius:var(--r);padding:18px;background:none;color:var(--td);font-size:14px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600}
.active-header{padding:54px 22px 16px;background:linear-gradient(180deg,#0d0d00,var(--bg))}
.active-title{font-family:var(--disp);font-size:32px;color:var(--t)}
.active-prog{display:flex;align-items:center;gap:12px;margin-top:12px}
.active-prog-bar{flex:1;height:4px;background:var(--s3);border-radius:100px;overflow:hidden}
.active-prog-fill{height:100%;background:var(--acc);border-radius:100px;transition:width .5s}
.active-prog-lbl{font-size:12px;color:var(--acc);font-family:var(--mono);font-weight:700}
.rest-timer{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:10px}
.rest-ring{width:90px;height:90px;margin:0 auto 12px;border-radius:50%;background:var(--s2);border:3px solid var(--border);display:flex;align-items:center;justify-content:center}
.rest-secs{font-family:var(--disp);font-size:40px;color:var(--t)}
.rest-label{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.log-ex{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.log-ex-head{padding:16px 18px;border-bottom:1px solid var(--border)}
.log-ex-name{font-size:16px;font-weight:700;color:var(--t)}
.log-ex-sub{font-size:12px;color:var(--td);margin-top:2px}
.log-set-row{display:flex;align-items:center;padding:12px 18px;gap:10px;border-bottom:1px solid var(--border)}
.log-set-row:last-child{border-bottom:none}
.set-num{font-family:var(--mono);font-size:12px;color:var(--td);width:20px}
.log-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r3);padding:8px 12px;color:var(--t);font-family:var(--mono);font-size:14px;font-weight:600;text-align:center;outline:none}
.check-btn{width:38px;height:38px;border-radius:var(--r3);border:1.5px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px}
.chart-wrap{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px}
.ch-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ch-title{font-size:15px;font-weight:700;color:var(--t)}
.ch-val{font-family:var(--mono);font-size:13px;color:var(--acc);font-weight:600}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px}
.bc-bar{flex:1;border-radius:5px 5px 0 0}
.bc-lbls{display:flex;gap:5px;margin-top:8px}
.bc-lbl{flex:1;text-align:center;font-size:9px;color:var(--td);font-family:var(--mono)}
.bstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.bsc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer}
.bsc-lbl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.bsc-val{font-family:var(--disp);font-size:34px;color:var(--t);line-height:1.1;margin-top:4px}
.bsc-unit{font-size:16px;color:var(--td)}
.bsc-chg{font-size:12px;font-weight:600;margin-top:4px}
.pr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pr-rank{width:36px;height:36px;background:var(--s2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.cam-feed{background:#050505;border:1px solid var(--border);border-radius:var(--r);height:210px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:12px}
.cam-corner{position:absolute;width:18px;height:18px;border-color:var(--acc);border-style:solid}
.cam-lbl{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--acc);font-family:var(--mono);letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}
.params{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
.pcard{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.pval{font-family:var(--disp);font-size:30px;color:var(--acc);line-height:1}
.punit{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.plbl{font-size:10px;color:var(--tm);margin-top:4px;font-weight:600}
.mode-sel{display:flex;background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:4px;gap:4px;margin-bottom:12px}
.mbtn{flex:1;padding:10px;border-radius:9px;border:none;background:none;color:var(--td);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.qr-wrap{width:220px;height:220px;background:var(--s1);border:2px solid var(--acc);border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 50px rgba(212,255,0,.1)}
.qr-c{position:absolute;width:22px;height:22px;border-color:var(--acc);border-style:solid}
.qr-g{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;width:170px;height:170px}
.qr-cell{border-radius:2px;background:var(--acc)}
.prof-hero{padding:56px 22px 22px;background:linear-gradient(160deg,#131300,var(--bg))}
.av{width:74px;height:74px;background:linear-gradient(135deg,var(--acc),#9ab800);border-radius:24px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:30px;color:#000;flex-shrink:0}
.pname{font-family:var(--disp);font-size:32px;color:var(--t);line-height:1}
.pgoal{font-size:12px;color:var(--acc);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:4px}
.met-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.met{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.met-v{font-family:var(--disp);font-size:28px;color:var(--t);line-height:1}
.met-u{font-size:11px;color:var(--acc);font-weight:700}
.met-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:600}
.obj-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer}
.obj-l{display:flex;align-items:center;gap:12px}
.obj-t{font-size:14px;font-weight:700;color:var(--t)}
.obj-s{font-size:12px;color:var(--td);margin-top:2px}
.obj-tag{background:rgba(212,255,0,.08);border:1px solid rgba(212,255,0,.2);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--acc);font-weight:700}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:14px;font-weight:600;color:var(--t)}
.set-val{font-size:14px;color:var(--td);font-family:var(--mono)}
.scan-pulse{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(212,255,0,.04) 50%,transparent);animation:scan 2.5s ease-in-out infinite}
@keyframes scan{0%,100%{transform:translateY(-100%)}50%{transform:translateY(100%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}
.modal-sheet{width:100%;background:var(--s1);border-radius:24px 24px 0 0;border:1px solid var(--border);padding:24px;max-height:80%;overflow-y:auto;scrollbar-width:none}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--s3);border-radius:100px;margin:0 auto 20px}
.modal-title{font-family:var(--disp);font-size:28px;color:var(--t);margin-bottom:16px}
.field-label{font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.field-input{width:100%;padding:14px 16px;border-radius:var(--r2);background:var(--s2);border:1px solid var(--border);color:var(--t);font-family:var(--font);font-size:15px;outline:none;margin-bottom:14px}
.sel-chip{padding:8px 16px;border-radius:100px;border:1px solid var(--border);background:var(--s2);color:var(--td);font-size:13px;font-weight:600;cursor:pointer;display:inline-block;margin:0 4px 8px 0}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:var(--acc);color:#000;border-radius:100px;padding:10px 20px;font-size:13px;font-weight:700;z-index:400;white-space:nowrap;animation:toastIn .3s ease both}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

const st={screen:"onboarding",tab:"home",subScreen:null,mode:"Hipertrofia",machineCnt:false,restTime:0,restActive:false,formData:{},modal:null};
let restTimer=null;

function loadState(){Object.keys(DEF).forEach(k=>{const s=lsGet(k);st[k]=s!==null?s:JSON.parse(JSON.stringify(DEF[k]));});}
function save(k){lsSet(k,st[k]);}

function showToast(msg){const el=document.getElementById("toast-root");el.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>{el.innerHTML="";},2200);}
function navTo(tab,sub=null){st.tab=tab;st.subScreen=sub;render();}
function getInitials(n){return(n||"").split(" ").slice(0,2).map(x=>x[0]).join("").toUpperCase();}

function startRest(secs){
  clearInterval(restTimer);st.restTime=secs;st.restActive=true;
  const ring=()=>document.querySelector(".rest-ring"),secsEl=()=>document.querySelector(".rest-secs"),lblEl=()=>document.querySelector(".rest-label");
  if(ring()){ring().style.borderColor="var(--acc)";ring().style.boxShadow="0 0 20px rgba(212,255,0,.2)";}
  if(secsEl())secsEl().textContent=secs;
  restTimer=setInterval(()=>{
    if(st.restTime>0)st.restTime--;else{st.restActive=false;clearInterval(restTimer);}
    if(secsEl())secsEl().textContent=st.restTime;
    if(ring()){ring().style.borderColor=st.restActive?"var(--acc)":"var(--border)";ring().style.boxShadow=st.restActive?"0 0 20px rgba(212,255,0,.2)":"none";}
    if(lblEl())lblEl().textContent=st.restActive?"Descansando...":"Listo";
  },1000);
}

function toggleSet(ei,si){
  const k=`${st.activeRoutine}-${ei}-${si}`,d=!st.completedSets[k];
  st.completedSets[k]=d;save("completedSets");
  if(d){startRest(90);showToast("✓ Serie completada");}
  const btn=document.querySelector(`[data-setbtn="${k}"]`);
  if(btn){btn.style.background=d?"rgba(212,255,0,.15)":"var(--s2)";btn.style.borderColor=d?"rgba(212,255,0,.5)":"var(--border)";btn.textContent=d?"✓":"○";}
  const bub=document.querySelector(`[data-bub="${k}"]`);
  if(bub){bub.style.background=d?"rgba(212,255,0,.08)":"var(--s2)";bub.style.color=d?"var(--acc)":"var(--td)";bub.style.borderColor=d?"rgba(212,255,0,.2)":"transparent";}
  const total=Object.values(st.routines[st.activeRoutine]?.exercises||[]).reduce((a,e)=>a+e.sets,0);
  const done=Object.entries(st.completedSets).filter(([k,v])=>k.startsWith(st.activeRoutine)&&v).length;
  const bar=document.querySelector(".active-prog-fill");if(bar)bar.style.width=`${total>0?(done/total)*100:0}%`;
  const lbl=document.querySelector(".active-prog-lbl");if(lbl)lbl.textContent=`${done}/${total}`;
}

function finishSession(){
  const exs=st.routines[st.activeRoutine]?.exercises||[];let vol=0;
  exs.forEach((ex,i)=>{for(let j=0;j<ex.sets;j++){const k=`${st.activeRoutine}-${i}-${j}`;vol+=(st.setWeights[k]?+st.setWeights[k]:(ex.kg||0))*(st.setReps[k]?+st.setReps[k]:(ex.reps||0));}});
  const done=Object.entries(st.completedSets).filter(([k,v])=>k.startsWith(st.activeRoutine)&&v).length;
  const sess={id:Date.now().toString(),date:new Date().toISOString().slice(0,10),routine:st.activeRoutine,duration:55+Math.round(Math.random()*15),volume:Math.round(vol)||8000,sets:done,completed:done>0};
  st.sessions=[sess,...st.sessions].slice(0,30);save("sessions");
  st.weekDone={...st.weekDone,X:true};save("weekDone");
  st.profile.streak=(st.profile.streak||0)+1;save("profile");
  st.subScreen=null;showToast("🎉 Sesión guardada");render();
}

function logReps(k,v){st.setReps[k]=v;clearTimeout(st._rt);st._rt=setTimeout(()=>save("setReps"),800);}

function clearSession(){st.completedSets={};st.setWeights={};st.setReps={};save("completedSets");save("setWeights");save("setReps");showToast("🗑 Sesión limpiada");render();}
function resetAll(){Object.keys(DEF).forEach(k=>{st[k]=JSON.parse(JSON.stringify(DEF[k]));lsSet(k,st[k]);});showToast("♻ Datos restablecidos");render();}

function lineSVG(data,color="#D4FF00"){
  if(!data||data.length<2)return"";
  const w=340,h=80,min=Math.min(...data),max=Math.max(...data);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/(max-min||1))*(h-8)-4}`).join(" ");
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%" preserveAspectRatio="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="M ${pts.split(" ")[0]} L ${pts} L ${w},${h} L 0,${h} Z" fill="url(#lg)"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function genQR(){return Array.from({length:81},(_,i)=>{const r=Math.floor(i/9),c=i%9;const corner=(r<3&&c<3)||(r<3&&c>5)||(r>5&&c<3);return`<div class="qr-cell" style="opacity:${corner||Math.random()>.45?1:0}"></div>`;}).join("");}

  const wDiff=(lW-pW).toFixed(1),lFat=bh[bh.length-1]?.bodyFat||st.profile.bodyFat;

  const root=document.getElementById("modal-root");
  if(!st.modal){root.innerHTML="";return;}
  const sheet=(title,body)=>`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div><div class="modal-title">${title}</div>${body}<button class="btn-dim" style="margin-top:10px" onclick="closeModal()">Cancelar</button></div></div>`;
  const field=(lbl,name,type="text",ph="")=>`<label class="field-label">${lbl}</label><input class="field-input" id="f_${name}" type="${type}" placeholder="${ph}" value="${st.formData[name]||""}">`;
  const m=st.modal;
  if(m==="addFood")root.innerHTML=sheet("AÑADIR ALIMENTO",`${field("Nombre","name","text","Pechuga a la plancha")}${field("Hora","time","time","13:00")}<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 10px"><div>${field("Calorías","kcal","number","350")}</div><div>${field("Proteína g","p","number","30")}</div><div>${field("Carbos g","c","number","40")}</div><div>${field("Grasa g","f","number","10")}</div></div><button class="btn-acc" style="margin-top:8px" onclick="saveFood()">Guardar alimento</button>`);
  else if(m==="editMeasurements")root.innerHTML=sheet("MEDIDAS CORPORALES",`<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 10px">${[["Pecho cm","chest"],["Cintura cm","waist"],["Bíceps flex.","bicepFlex"],["Muslo cm","thigh"],["Hombros cm","shoulder"],["Pantorrilla cm","calf"]].map(([l,k])=>`<div>${field(l,k,"number",st.measurements[k])}</div>`).join("")}</div><button class="btn-acc" onclick="saveMeasurements()">Guardar medidas</button>`);
  else if(m==="editProfile"){const p=st.profile;root.innerHTML=sheet("EDITAR PERFIL",`${field("Nombre completo","name","text",p.name)}<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 10px"><div>${field("Peso kg","weight","number",p.weight)}</div><div>${field("Altura cm","height","number",p.height)}</div><div>${field("Grasa %","bodyFat","number",p.bodyFat)}</div><div>${field("Peso objetivo","targetWeight","number",p.targetWeight)}</div></div><label class="field-label">Objetivo</label><div style="margin-bottom:14px">${["Hipertrofia","Fuerza","Resistencia","Pérdida de grasa","Potencia"].map(g=>`<span class="sel-chip" style="${(st.formData.goal||p.goal)===g?'background:rgba(212,255,0,.12);border-color:rgba(212,255,0,.4);color:var(--acc)':''}" onclick="st.formData.goal='${g}';renderModal()">${g}</span>`).join("")}</div>${field("Deporte","sport","text",p.sport)}<button class="btn-acc" onclick="saveProfile()">Guardar cambios</button>`);}
  else if(m==="weightLog")root.innerHTML=sheet("REGISTRAR PESO",`${field("Peso de hoy kg","weight","number",st.profile.weight)}${field("Grasa corporal %","bodyFat","number",st.profile.bodyFat)}<button class="btn-acc" onclick="saveWeight()">Guardar</button>`);
  else if(m==="addExercise"){const types=[null,"Fallo","Dropset","21s","Superserie"],cur=st.formData.exType===undefined?null:st.formData.exType;root.innerHTML=sheet("AÑADIR EJERCICIO",`${field("Nombre del ejercicio","exName","text","Press de banca")}${field("Músculo principal","exMuscle","text","Pectoral Mayor")}<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 10px"><div>${field("Series","exSets","number","4")}</div><div>${field("Reps","exReps","number","10")}</div><div>${field("Peso kg","exKg","number","0")}</div></div><label class="field-label">Tipo de serie</label><div style="margin-bottom:14px">${types.map(t=>`<span class="sel-chip" style="${cur===t?'background:rgba(212,255,0,.12);border-color:rgba(212,255,0,.4);color:var(--acc)':''}" onclick="st.formData.exType='${t}';renderModal()">${t||"Normal"}</span>`).join("")}</div><button class="btn-acc" onclick="saveExercise()">Añadir ejercicio</button>`);}
  else if(m==="newRoutine")root.innerHTML=sheet("NUEVA RUTINA",`${field("Nombre de la rutina","routineName","text","Full Body, Bíceps...")}<button class="btn-acc" onclick="saveRoutine()">Crear rutina</button>`);
  else if(m==="addPR"){const cur=st.formData.prEx||st.prs[0]?.ex||"";root.innerHTML=sheet("ACTUALIZAR RÉCORD",`<label class="field-label">Ejercicio</label><div style="margin-bottom:14px">${st.prs.map(p=>`<span class="sel-chip" style="${cur===p.ex?'background:rgba(212,255,0,.12);border-color:rgba(212,255,0,.4);color:var(--acc)':''}" onclick="st.formData.prEx='${p.ex}';renderModal()">${p.ex}</span>`).join("")}</div>${field("Nuevo récord kg","prVal","number","0")}<button class="btn-acc" onclick="savePR()">Guardar récord</button>`);}
}

const fv=name=>(document.getElementById("f_"+name)||{}).value||"";
function saveFood(){const name=fv("name"),kcal=+fv("kcal");if(!name||!kcal){showToast("⚠ Nombre y calorías requeridos");return;}st.nutrition.foods=[...st.nutrition.foods,{id:Date.now().toString(),name,time:fv("time")||"12:00",kcal,p:+(fv("p")||0),c:+(fv("c")||0),f:+(fv("f")||0)}];save("nutrition");showToast("🥗 Alimento añadido");closeModal();render();}
function saveMeasurements(){["chest","waist","bicepFlex","thigh","shoulder","calf"].forEach(k=>{const v=fv(k);if(v)st.measurements[k]=+v;});save("measurements");showToast("📏 Medidas guardadas");closeModal();render();}
function saveProfile(){const p=st.profile,name=fv("name"),w=fv("weight"),h=fv("height"),bf=fv("bodyFat"),tw=fv("targetWeight"),sport=fv("sport");if(name)p.name=name;if(w)p.weight=+w;if(h)p.height=+h;if(bf)p.bodyFat=+bf;if(tw)p.targetWeight=+tw;if(sport)p.sport=sport;if(st.formData.goal)p.goal=st.formData.goal;save("profile");if(w){st.bodyHistory=[...st.bodyHistory,{date:new Date().toISOString().slice(0,10),weight:+w,bodyFat:bf?+bf:p.bodyFat}];save("bodyHistory");}showToast("✓ Perfil actualizado");closeModal();render();}
function saveWeight(){const w=fv("weight"),bf=fv("bodyFat");if(!w){showToast("⚠ Introduce tu peso");return;}st.bodyHistory=[...st.bodyHistory,{date:new Date().toISOString().slice(0,10),weight:+w,bodyFat:bf?+bf:st.profile.bodyFat}];st.profile.weight=+w;if(bf)st.profile.bodyFat=+bf;save("bodyHistory");save("profile");showToast("⚖️ Peso registrado");closeModal();render();}
function saveExercise(){const name=fv("exName");if(!name){showToast("⚠ Nombre requerido");return;}if(!st.routines[st.activeRoutine])st.routines[st.activeRoutine]={exercises:[]};st.routines[st.activeRoutine].exercises=[...st.routines[st.activeRoutine].exercises,{name,muscle:fv("exMuscle")||"—",sets:+(fv("exSets")||3),reps:+(fv("exReps")||10),kg:+(fv("exKg")||0),type:st.formData.exType||null,rec:"Registra el peso y reps de esta sesión."}];save("routines");showToast("💪 Ejercicio añadido");closeModal();render();}
function saveRoutine(){const name=fv("routineName").trim();if(!name){showToast("⚠ Nombre requerido");return;}st.routines[name]={exercises:[]};save("routines");st.activeRoutine=name;save("activeRoutine");showToast(`✓ Rutina "${name}" creada`);closeModal();render();}
function savePR(){const exName=st.formData.prEx||st.prs[0]?.ex,val=+fv("prVal");if(!exName||!val){showToast("⚠ Selecciona ejercicio y valor");return;}st.prs=st.prs.map(p=>p.ex===exName?{...p,pr:val,date:new Date().toLocaleDateString("es-ES",{day:"numeric",month:"short"}),history:[...(p.history||[]),val]}:p);save("prs");showToast("🏆 Récord actualizado");closeModal();render();}

function render(){
  const scr=document.getElementById("screen"),bnav=document.getElementById("bnav");
  if(st.screen==="onboarding"||st.screen==="loading"){scr.innerHTML=renderOnboarding();bnav.style.display="none";return;}
  bnav.style.display="flex";
  document.querySelectorAll(".ni").forEach(n=>n.classList.remove("a"));
  const nb=document.getElementById("ni-"+st.tab);if(nb)nb.classList.add("a");
  switch(st.tab){case"home":scr.innerHTML=renderHome();break;case"workout":scr.innerHTML=renderWorkout();break;case"machine":scr.innerHTML=renderMachine();break;case"access":scr.innerHTML=renderAccess();break;case"progress":scr.innerHTML=renderProgress();break;case"profile":scr.innerHTML=renderProfile();break;default:scr.innerHTML=renderHome();}
  scr.scrollTop=0;renderModal();
}

setInterval(()=>{const el=document.getElementById("clock");if(el){const n=new Date();el.textContent=n.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});}},1000);

loadState();
render();
</script>
</body>
</html>
